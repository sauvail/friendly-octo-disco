<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Suivi">
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Suivi Muscu</title>
<style>
:root{
  --bg:#0f1115; --card:#1a1d24; --card2:#232730; --line:#2c313c;
  --txt:#e8eaed; --mut:#9aa3b2; --acc:#4f8cff; --green:#3ecf8e; --orange:#ff8a4c;
  --red:#ff5c5c; --yellow:#ffd23f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.4;overscroll-behavior-y:none}
#app{max-width:560px;margin:0 auto;padding:calc(46px + env(safe-area-inset-top)) 14px 96px}
h1{font-size:20px;margin:6px 0 14px}
h2{font-size:16px;margin:18px 0 8px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.row{display:flex;align-items:center;gap:10px}
.between{justify-content:space-between}
.mut{color:var(--mut);font-size:13px}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--card2);color:var(--mut)}
.tag.main{background:#1d3a5f;color:#bcd6ff}
.tag.cardio{background:#3a2a1d;color:#ffd6bc}
button{font:inherit;color:var(--txt);background:var(--card2);border:1px solid var(--line);
  border-radius:11px;padding:11px 14px;cursor:pointer;min-height:44px}
button:active{transform:scale(.97)}
button.acc{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
button.gh{background:transparent}
button.sm{padding:7px 11px;min-height:38px;font-size:14px;border-radius:9px}
button.danger{color:var(--red);border-color:#5a2730;background:#2a1418}
.full{width:100%}
input,select{font:inherit;color:var(--txt);background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:10px;width:100%;min-height:44px}
input:focus,select:focus{outline:2px solid var(--acc);border-color:var(--acc)}
input[inputmode="decimal"],input[inputmode="numeric"],input[type="number"]{text-align:center}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.setrow{display:grid;grid-template-columns:34px 1fr 1fr 1fr 34px;gap:7px;align-items:center;margin-bottom:7px}
.setrow .lab{font-size:10px;color:var(--mut);text-align:center}
.chk{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);background:var(--bg);font-size:18px;cursor:pointer}
.chk.on{background:var(--green);border-color:var(--green);color:#06231a}
.topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding:6px 12px;padding-top:calc(6px + env(safe-area-inset-top));background:#12151b;border-bottom:1px solid var(--line)}
.topbar .brand{font-weight:700;font-size:15px}
.syncpill{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line);
  border-radius:99px;padding:5px 11px;font-size:12px;color:var(--mut);cursor:pointer;max-width:62vw}
.syncpill .dot{width:8px;height:8px;border-radius:50%;background:var(--mut);flex:none}
.syncpill.ok .dot{background:var(--green)}
.syncpill.sync .dot{background:var(--yellow);animation:pulse 1s infinite}
.syncpill.err .dot{background:var(--red)}
.syncpill.off .dot{background:var(--mut)}
@keyframes pulse{50%{opacity:.3}}
nav{position:fixed;left:0;right:0;bottom:0;background:#12151b;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:30}
nav button{flex:1;background:none;border:none;color:var(--mut);font-size:11px;display:flex;
  flex-direction:column;align-items:center;gap:3px;padding:6px 2px;min-height:50px}
nav button.on{color:var(--acc)}
nav .ic{font-size:20px}
.crumb{font-size:13px;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.crumb a{color:var(--acc);cursor:pointer}
.empty{text-align:center;color:var(--mut);padding:40px 10px}
.pill{display:inline-block;font-size:12px;color:var(--mut);background:var(--card2);padding:3px 9px;border-radius:8px}
.stat{font-size:26px;font-weight:700}
.bar{height:10px;background:var(--card2);border-radius:6px;overflow:hidden}
.bar>span{display:block;height:100%;background:var(--acc)}
svg{display:block;width:100%}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#000;color:#fff;
  padding:10px 16px;border-radius:10px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:.92}
label.fld{display:block;font-size:12px;color:var(--mut);margin:0 0 4px}
.mb{margin-bottom:10px}.mt{margin-top:8px}
/* ----- program board (kanban) ----- */
.progchips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{flex:none;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:99px;padding:7px 14px;min-height:0;font-size:14px}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.chip.add{color:var(--acc);font-weight:700}
.weekcol{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.weekhead{display:flex;align-items:center;gap:6px;padding:9px 10px;background:var(--card2)}
.weekhead .wtitle{flex:1;font-weight:600;cursor:pointer;min-width:0}
.grip{cursor:grab;color:var(--mut);font-size:15px;letter-spacing:-2px;touch-action:none;user-select:none;padding:6px 4px}
.wtoggle{background:none;border:none;color:var(--mut);min-height:0;padding:2px 4px;font-size:12px;width:26px}
.iconbtn{background:none;border:none;color:var(--mut);min-height:0;padding:6px 8px;font-size:18px;line-height:1}
.cards{display:flex;flex-direction:column;gap:10px;padding:11px}
.wcard{display:flex;align-items:stretch;background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.wcard-grip{display:flex;align-items:center;padding:0 6px;color:var(--mut);cursor:grab;touch-action:none;border-right:1px solid var(--line);font-size:15px;letter-spacing:-2px}
.wcard-body{flex:1;padding:11px 12px;cursor:pointer;min-width:0}
.wcard-title{font-weight:600;margin-bottom:2px}
.wcard-body .bar{margin-top:8px}
.runbtn{flex:none;width:56px;border:none;border-left:1px solid var(--line);background:var(--acc);color:#fff;font-size:18px;border-radius:0;display:flex;align-items:center;justify-content:center}
.addcard,.addweek{background:transparent;border:1px dashed var(--line);color:var(--mut);border-radius:10px;width:100%}
.drag-src{opacity:.28}
.dragghost{position:fixed;z-index:90;pointer-events:none;opacity:.96;box-shadow:0 14px 34px rgba(0,0,0,.55);transform:rotate(1.4deg)}
.dropline{position:fixed;height:3px;background:var(--acc);border-radius:2px;z-index:88;pointer-events:none;box-shadow:0 0 8px var(--acc);display:none}
.popmenu{position:fixed;background:var(--card2);border:1px solid var(--line);border-radius:11px;z-index:70;display:flex;flex-direction:column;min-width:172px;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.55)}
.popmenu button{background:none;border:none;text-align:left;padding:12px 15px;border-radius:0;border-bottom:1px solid var(--line);min-height:0}
.popmenu button:last-child{border-bottom:none}
.popmenu button.danger{color:var(--red);background:none}
/* ----- modals & snackbar ----- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:16px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -12px 40px rgba(0,0,0,.55);animation:slideup .18s ease}
@keyframes slideup{from{transform:translateY(20px);opacity:.4}to{transform:none;opacity:1}}
@media(min-width:480px){.scrim{align-items:center}.modal{border-radius:16px;margin:0 12px}}
.modal h3{margin:2px 0 10px;font-size:17px}
.modal .mrow{display:flex;gap:8px;margin-top:14px}
.modal .mrow button{flex:1}
.mlist{max-height:48vh;overflow:auto;margin:8px 0 2px}
.mlist button{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:7px}
.msearch{margin-bottom:8px}
.snackbar{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#202632;border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:7px 7px 7px 14px;display:none;align-items:center;gap:10px;z-index:85;box-shadow:0 8px 24px rgba(0,0,0,.5);font-size:14px}
.snackbar.show{display:flex}
.snackbar button{min-height:0;padding:8px 12px;background:none;border:none;color:var(--acc);font-weight:600}
.stepwrap{display:flex;align-items:stretch}
.stepwrap input{border-radius:0;border-left:none;border-right:none}
.stepbtn{flex:none;width:30px;background:var(--card2);border:1px solid var(--line);color:var(--txt);min-height:0;padding:0;font-size:17px}
.stepbtn.l{border-radius:10px 0 0 10px}.stepbtn.r{border-radius:0 10px 10px 0}
.resttimer{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--acc);color:#fff;border-radius:14px;padding:9px 14px;display:none;align-items:center;gap:12px;z-index:86;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.resttimer.show{display:flex}
body.running #app{padding-bottom:calc(176px + env(safe-area-inset-bottom))} /* keep "Terminer" clear of the rest-timer bar */
.resttimer .rt-time{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;min-width:54px;text-align:center}
.resttimer button{min-height:0;padding:6px 10px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;font-size:13px}
.lasttime{font-size:12px;color:var(--green);margin:-3px 0 8px 40px}
.plates{display:flex;flex-wrap:wrap;gap:5px;margin:-2px 0 8px 40px}
.plate{font-size:11px;font-weight:700;color:#06231a;background:var(--green);border-radius:6px;padding:2px 7px}
.callbl,.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.callbl span{font-size:10px;color:var(--mut);text-align:center}
.cal .d{aspect-ratio:1;border-radius:4px;background:var(--card2)}
.cal .d.l1{background:#21402f}.cal .d.l2{background:#2c6b4d}.cal .d.l3{background:var(--green)}
.cal .d.empty{background:transparent}
.ssgroup{border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:12px;padding:6px 8px;margin-bottom:12px;background:var(--card)}
.sslabel{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:.05em;padding:2px 4px}
.vrow{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
.vrow:last-child{border:none}
.setline{display:flex;gap:8px;align-items:flex-start;margin-bottom:2px;border-radius:11px;transition:background .12s}
.setline .chk{margin-top:4px;flex:none}
/* clearer "set done" state during a run */
.setline.done{background:rgba(62,207,142,.13);box-shadow:inset 3px 0 0 var(--green);padding:5px 6px;margin-left:-6px;margin-right:-6px}
.setrow.done{background:rgba(62,207,142,.13);box-shadow:inset 3px 0 0 var(--green);border-radius:9px}
.chk.on{font-size:20px;box-shadow:0 0 0 3px rgba(62,207,142,.25)}
.tdone{text-decoration:line-through;opacity:.55}
.sfields{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.srow{display:flex;align-items:center;gap:8px}
.slab{font-size:10px;color:var(--mut);width:34px;flex:none}
.srow .stepwrap{flex:1;min-width:0}
.rpein{width:60px;flex:none}
.card.ssitem{border-left:3px solid var(--acc)}
.mods{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 8px}
.modchip{font-size:12px;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:3px 9px;color:var(--mut);display:inline-flex;gap:6px;align-items:center}
.modchip b{color:var(--red);cursor:pointer;font-weight:400}
.editcols{display:flex;gap:12px;overflow-x:auto;width:100vw;margin-left:calc(50% - 50vw);padding:0 14px 14px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.editcol{flex:0 0 86vw;max-width:340px;scroll-snap-align:start;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px}
@media(min-width:560px){.editcol{flex:0 0 320px}}
.runbtn2{background:var(--acc);color:#fff;border:none;border-radius:9px;min-height:0;padding:7px 11px;font-size:14px}
.repcell{display:flex;gap:2px;min-width:0}.repcell>input{flex:1;min-width:0}
.ambtn{width:26px;flex:none;background:var(--card2);border:1px solid var(--line);color:var(--mut);min-height:0;padding:0;font-size:13px;border-radius:8px}
.ambtn.on{background:var(--acc);border-color:var(--acc);color:#fff}
.amon{color:var(--acc);font-weight:700;font-size:11px;text-align:center}
.restin{max-width:84px}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">🏋️ Suivi Muscu</div>
  <div id="sync" class="syncpill off"><span class="dot"></span><span id="syncTxt">local</span></div>
</header>
<div id="app"></div>
<nav id="nav"></nav>
<div class="toast" id="toast"></div>
<div class="dropline" id="dropline"></div>
<div class="snackbar" id="snack"><span id="snackmsg"></span><button id="snackbtn">Annuler</button></div>
<div class="snackbar" id="updbar" style="bottom:calc(144px + env(safe-area-inset-bottom))"><span>Nouvelle version disponible</span><button id="updbtn">Recharger</button></div>
<div class="resttimer" id="rest"><button onclick="restAdd(-15)">−15s</button><span class="rt-time" id="restTime">0:00</span><button onclick="restAdd(15)">+15s</button><button onclick="restSkip()">Passer ✓</button></div>
<div id="modalRoot"></div>
<script>
"use strict";
const KEY="pl_app_v1";
const CKEY="pl_cloud_v1";
const API="https://api.jsonbin.io/v3";
const uid=()=>Math.random().toString(36).slice(2,9);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const nowISO=()=>new Date().toISOString();
const today=()=>new Date().toISOString().slice(0,10);
const scrollTop=()=>window.scrollTo(0,0);
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1700);}

/* plan sets hold TARGETS only; execution actuals live in S.sessions, never on the plan */
const mkset=(load,r,rpe)=>({id:uid(),load:load,reps:r,rpe:rpe});
const mkcardio=(dur,dist)=>({id:uid(),dur:dur,dist:dist});
const mkcarry=(load,dist)=>({id:uid(),load:load,dist:dist});

/* ---------- exercise library [name, category, muscle, metric?, lift?] ---------- */
const LIB=[
  ["Squat","Principal","Quadriceps","weight","squat"],
  ["Développé couché","Principal","Pectoraux","weight","bench"],
  ["Soulevé de terre","Principal","Ischios","weight","deadlift"],
  ["Squat avant","Bas du corps","Quadriceps"],
  ["Développé incliné","Haut du corps","Pectoraux"],
  ["Développé haltères","Haut du corps","Pectoraux"],
  ["Écarté haltères","Haut du corps","Pectoraux"],
  ["Écarté poulie","Haut du corps","Pectoraux"],
  ["Dips","Haut du corps","Pectoraux"],
  ["Pompes","Haut du corps","Pectoraux"],
  ["Rowing barre","Haut du corps","Dos"],
  ["Rowing haltère","Haut du corps","Dos"],
  ["Tirage horizontal","Haut du corps","Dos"],
  ["Tirage vertical","Haut du corps","Dos"],
  ["Tractions","Haut du corps","Dos"],
  ["Rowing T-barre","Haut du corps","Dos"],
  ["Pull-over","Haut du corps","Dos"],
  ["Développé militaire","Haut du corps","Épaules"],
  ["Développé haltères épaules","Haut du corps","Épaules"],
  ["Élévations latérales","Haut du corps","Épaules"],
  ["Élévations frontales","Haut du corps","Épaules"],
  ["Oiseau","Haut du corps","Épaules"],
  ["Face pull","Haut du corps","Épaules"],
  ["Shrug haltères","Haut du corps","Trapèzes"],
  ["Shrug barre","Haut du corps","Trapèzes"],
  ["Curl barre","Haut du corps","Biceps"],
  ["Curl haltères","Haut du corps","Biceps"],
  ["Curl pupitre","Haut du corps","Biceps"],
  ["Curl marteau","Haut du corps","Biceps"],
  ["Curl incliné","Haut du corps","Biceps"],
  ["Extension poulie","Haut du corps","Triceps"],
  ["Barre au front","Haut du corps","Triceps"],
  ["Extension nuque","Haut du corps","Triceps"],
  ["Dips triceps","Haut du corps","Triceps"],
  ["Kickback","Haut du corps","Triceps"],
  ["Curl poignets","Haut du corps","Avant-bras"],
  ["Presse à cuisses","Bas du corps","Quadriceps"],
  ["Fentes","Bas du corps","Quadriceps"],
  ["Leg extension","Bas du corps","Quadriceps"],
  ["Hack squat","Bas du corps","Quadriceps"],
  ["Squat gobelet","Bas du corps","Quadriceps"],
  ["Soulevé de terre roumain","Bas du corps","Ischios"],
  ["Leg curl","Bas du corps","Ischios"],
  ["Good morning","Bas du corps","Ischios"],
  ["Hip thrust","Bas du corps","Fessiers"],
  ["Fentes bulgares","Bas du corps","Fessiers"],
  ["Mollets debout","Bas du corps","Mollets"],
  ["Mollets assis","Bas du corps","Mollets"],
  ["Crunch","Autre","Abdos"],
  ["Planche","Autre","Abdos"],
  ["Relevé de jambes","Autre","Abdos"],
  ["Roue abdominale","Autre","Abdos"],
  ["Extension lombaire","Autre","Lombaires"],
  ["Course","Cardio","","cardio"],
  ["Vélo","Cardio","","cardio"],
  ["Rameur","Cardio","","cardio"],
  ["Corde à sauter","Cardio","","cardio"],
  ["Tapis de course","Cardio","","cardio"]
];
const MUSCLE_HINTS=[
  [/poignet|avant-?bras|wrist/,"Avant-bras"],
  [/squat|presse à? ?cuiss|leg ?ext|hack|gobelet|fente avant|quadri/,"Quadriceps"],
  [/roumain|rdl|leg ?curl|good morning|ischio|soulevé de terre roumain/,"Ischios"],
  [/hip thrust|fessier|glute|bulgare/,"Fessiers"],
  [/mollet|calf|calves/,"Mollets"],
  [/couch|pectora|écart|ecart|dips(?! triceps)|pompe|chest|incliné|décliné/,"Pectoraux"],
  [/row|rowing|tirage|traction|lat |dos|pull-?over|pull ?up|t-barre/,"Dos"],
  [/militaire|ohp|épaule|epaule|élévation|elevation|oiseau|face pull|overhead/,"Épaules"],
  [/shrug|trapèze|trapeze/,"Trapèzes"],
  [/triceps|barre au front|kickback|extension (poulie|nuque)/,"Triceps"],
  [/curl|biceps/,"Biceps"],
  [/crunch|planche|abdo|gainage|relevé de jambe|roue/,"Abdos"],
  [/lombaire|hyperext/,"Lombaires"],
  [/terre|deadlift/,"Ischios"]
];

/* ---------- modifiers [key, label, unit, placeholder, hint] ---------- */
const MODIFIERS=[
  {key:"tempo",label:"Tempo",unit:"",ph:"3-1-1-0",hint:"excentrique-pause-concentrique-pause"},
  {key:"pause",label:"Pause",unit:"s",ph:"2",hint:"temps de pause (secondes)"},
  {key:"restpause",label:"Rest-pause",unit:"s",ph:"15",hint:"repos court intra-série"},
  {key:"dropset",label:"Drop set",unit:"%",ph:"20",hint:"baisse de charge"},
  {key:"myo",label:"Myo-reps",unit:"",ph:"5+3+3",hint:""},
  {key:"bande",label:"Élastique / Chaîne",unit:"",ph:"bande verte",hint:"résistance accommodante"},
  {key:"partiel",label:"Partiel",unit:"",ph:"1/2 amplitude",hint:""},
  {key:"unilateral",label:"Unilatéral",unit:"",ph:"",hint:"par côté"},
  {key:"note",label:"Note",unit:"",ph:"…",hint:"texte libre"}
];

/* ---------- state ---------- */
let S=load();
let view="prog";          // prog | stats | data
let curPi=0;              // selected program
let edit=null;            // {wi,di} workout being edited
let running=null;         // {wi,di} workout being run/logged
let runDraft=null;        // live execution draft — decoupled from the saved plan
let statEx=null;          // stats per-exercise detail
let statSess=null;        // stats: a past session being inspected
let editAll=false;        // multi-column "edit all séances" view
const COLL=new Set();     // collapsed week ids (ephemeral)

function load(){
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.exercises)return migrate(r);}catch(e){}
  return seed();
}
function persistLocal(){localStorage.setItem(KEY,JSON.stringify(S));}
function persist(){S.updatedAt=nowISO();persistLocal();Cloud.markDirty();Cloud.schedulePush();}

function migrate(o){
  if(!o||!o.exercises)return o;
  o.v=o.v||2;
  if(o.updatedAt==null)o.updatedAt=nowISO();
  if(!o.settings)o.settings={};
  if(o.settings.round==null)o.settings.round=2.5;
  if(!o.settings.sex)o.settings.sex="M";
  if(o.settings.bar==null)o.settings.bar=20;
  if(o.settings.rest==null)o.settings.rest=120;
  if(o.settings.notify==null)o.settings.notify=false;
  if(!Array.isArray(o.bodyweight))o.bodyweight=[];
  if(!Array.isArray(o.sessions))o.sessions=[];
  o.exercises.forEach(e=>{
    if(!e.category)e.category=e.type==="SBD"?"Principal":"Autre";
    if(!e.metric)e.metric="weight";
    if(e.lift===undefined){
      const n=(e.name||"").toLowerCase();
      e.lift=/squat/.test(n)?"squat":/couch|bench|développé|developpe/.test(n)?"bench":/terre|deadlift|soulev/.test(n)?"deadlift":null;
    }
    if(e.orm==null)e.orm=0;
  });
  const exMap={};o.exercises.forEach(e=>exMap[e.id]=e);
  const rnd=o.settings.round||2.5;
  (o.programs||[]).forEach(p=>(p.weeks||[]).forEach(w=>(w.days||[]).forEach(d=>(d.items||[]).forEach(it=>(it.sets||[]).forEach(s=>{
    // plan/execution split: the saved plan keeps targets only — drop any embedded actuals
    ["aLoad","aReps","aRpe","aDur","aDist","done","date"].forEach(k=>{delete s[k];});
    // 1RM-reference mechanic removed: bake any old %1RM plan into an absolute load
    if(s.pct!=null){const ex=exMap[it.exId];if(ex&&ex.orm>0&&s.load==null)s.load=Math.round((ex.orm*s.pct/100)/rnd)*rnd;delete s.pct;}
  })))));
  o.exercises.forEach(e=>{e.orm=0;});
  return o;
}

function setStress(set){
  let reps=set.reps==="AMRAP"?8:Math.round(+set.reps||0);   // AMRAP → nominal 8 reps
  if(reps<1)return 0; if(reps>20)reps=20;
  let rpe=(set.rpe!=null&&set.rpe!=="")?+set.rpe:8;          // default target RPE 8 if blank
  rpe=Math.round(rpe*2)/2; if(rpe<6)rpe=6; if(rpe>10)rpe=10;
  const row=SI_RPE[rpe];
  return row?row[reps-1]:0;
}
function itemStress(it){return it.sets.reduce((u,s)=>u+setStress(s),0);}   // Stress Index per exercise
function workoutStress(d){return d.items.reduce((t,it)=>t+itemStress(it),0);}
function weekStress(w){return w.days.reduce((t,d)=>t+workoutStress(d),0);}
const fmtStress=x=>{const v=Math.round(x*10)/10;return Number.isInteger(v)?(v+""):v.toFixed(1);};
/* rough workout duration: Σ over sets of (exercise rest + a fixed work allowance) */

function estDuration(d){let sec=0;d.items.forEach(it=>{const rest=it.rest!=null?+it.rest:(S.settings.rest||120);it.sets.forEach(()=>{sec+=rest+WORK_PER_SET;});});return sec;}

/* ---------- cloud sync (jsonbin.io) ---------- */
const Cloud={
  cfg:{binId:"",key:"",keyType:"master",lastSyncedAt:null},
  dirty:false,pushTimer:null,status:"idle",
  loadCfg(){try{const r=JSON.parse(localStorage.getItem(CKEY));if(r)this.cfg={...this.cfg,...r};}catch(e){}},
  saveCfg(){localStorage.setItem(CKEY,JSON.stringify(this.cfg));},
  enabled(){return !!(this.cfg.binId&&this.cfg.key);},
  headers(extra){const h={"Content-Type":"application/json"};h[this.cfg.keyType==="access"?"X-Access-Key":"X-Master-Key"]=this.cfg.key;return Object.assign(h,extra||{});},
  setStatus(s,msg){this.status=s;this.msg=msg||"";renderSync();},
  markDirty(){this.dirty=true;renderSync();},
  async apiCreate(){
    const r=await fetch(API+"/b",{method:"POST",headers:this.headers({"X-Bin-Private":"true","X-Bin-Name":"suivi-muscu"}),body:JSON.stringify(S)});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();return j.metadata.id;
  },
  async apiGet(){
    const r=await fetch(API+"/b/"+this.cfg.binId+"/latest",{headers:this.headers()});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();return j.record;
  },
  async apiPut(){
    const r=await fetch(API+"/b/"+this.cfg.binId,{method:"PUT",headers:this.headers(),body:JSON.stringify(S)});
    if(!r.ok)throw new Error("HTTP "+r.status);
    return true;
  },
  async apiVersions(){
    const r=await fetch(API+"/b/"+this.cfg.binId+"/versions",{headers:this.headers()});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();
    return (j&&j.record&&j.record.versions)||(j&&j.versions)||(Array.isArray(j)?j:[]);
  },
  async apiVersion(v){
    const r=await fetch(API+"/b/"+this.cfg.binId+"/versions/"+v,{headers:this.headers()});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();return j.record;
  },
  schedulePush(){
    if(!this.enabled())return;
    clearTimeout(this.pushTimer);
    this.pushTimer=setTimeout(()=>this.push(),2000);
  },
  async push(){
    if(!this.enabled()||!this.dirty)return;
    if(!navigator.onLine){this.setStatus("off");return;}
    this.setStatus("sync","Envoi…");
    try{
      await this.apiPut();
      this.dirty=false;this.cfg.lastSyncedAt=S.updatedAt;this.saveCfg();
      this.setStatus("ok");
    }catch(e){this.setStatus("err",e.message);}
  },
  async pull(){
    if(!this.enabled())return;
    if(!navigator.onLine){this.setStatus("off");return;}
    this.setStatus("sync","Réception…");
    try{
      const cloud=await this.apiGet();
      if(!cloud||!cloud.exercises){this.dirty=true;await this.push();return;}
      const cu=cloud.updatedAt||"",lu=S.updatedAt||"",ls=this.cfg.lastSyncedAt||"";
      if(this.dirty && cu>ls && cu!==lu){
        const keepCloud=await modalConfirm("Des modifications existent sur CET appareil ET dans le cloud. Garder quelle version ?",{title:"Conflit de synchro",ok:"Version cloud",cancel:"Cet appareil"});
        if(keepCloud)adoptCloud(cloud);else await this.push();
      }else if(cu>lu){
        adoptCloud(cloud);
      }else if(lu>cu && this.dirty){
        await this.push();
      }else{
        this.cfg.lastSyncedAt=cu||S.updatedAt;this.saveCfg();this.setStatus("ok");
      }
    }catch(e){this.setStatus("err",e.message);}
  },
  async syncNow(interactive){
    if(!this.enabled()){if(interactive){go("data");toast("Configure le cloud (onglet Données)");}return;}
    await this.pull();
    if(this.dirty)await this.push();
    if(this.status==="ok"&&interactive)toast("Synchronisé");
  }
};
function adoptCloud(cloud){
  S=migrate(cloud);
  if(curPi>=S.programs.length)curPi=0;
  edit=null;running=null;
  Cloud.dirty=false;Cloud.cfg.lastSyncedAt=S.updatedAt;Cloud.saveCfg();
  persistLocal();render();Cloud.setStatus("ok");
}
function renderSync(){
  const el=$("#sync");if(!el)return;
  const txt=$("#syncTxt");
  if(!Cloud.enabled()){el.className="syncpill off";if(txt)txt.textContent="local";el.title="Stockage local — touche pour configurer le cloud";return;}
  const map={ok:["ok","à jour"],sync:["sync",Cloud.msg||"synchro…"],err:["err","erreur"],off:["off","hors-ligne"],idle:["off","prêt"]};
  let key=Cloud.status;
  if(key==="ok"&&Cloud.dirty)key="sync";
  const m=map[key]||map.idle;
  el.className="syncpill "+m[0];
  if(txt)txt.textContent=(Cloud.dirty&&Cloud.status==="ok")?"à envoyer":m[1];
  el.title=Cloud.msg||"";
}

    return `<h1>Programme</h1><div class="empty">Aucun programme.<br><br><button class="acc" onclick="addProgram()">＋ Créer un programme</button></div>`;
  if(curPi>=S.programs.length)curPi=0;

    S.programs.map((pr,i)=>`<button class="chip ${i===curPi?'on':''}" onclick="selProg(${i})">${esc(pr.name)}</button>`).join("")+
    `<button class="chip add" onclick="addProgram()">＋</button></div>
    <div class="row between mb"><h1 style="margin:0">${esc(p.name)}</h1>
      <button class="iconbtn" onclick="progMenu(event)">⋯</button></div>`;
  if(p.weeks.some(w=>w.days.length)) h+=`<button class="full gh mb" onclick="openEditAll()">✎ Tout éditer les séances</button>`;
  if(!p.weeks.length){
    h+=`<div class="empty">Aucune semaine.<br><br><button class="acc" onclick="addWeek()">＋ Semaine</button></div>`;

  p.weeks.forEach((w,wi)=>{

      <div class="weekhead">
        <span class="grip" onpointerdown="dragStart(event,'week',${wi},0)">⋮⋮</span>

      </div>`;
    if(!collapsed){
      h+=`<div class="cards" data-weekbody data-wi="${wi}">`;
      w.days.forEach((d,di)=>{
        const tot=d.items.reduce((s,it)=>s+it.sets.length,0);
        const preview=d.items.map(it=>{const e=exById(it.exId);return e?e.name:(it.muscle?'💪 '+it.muscle:'?');}).slice(0,3).join(' · ');
        const active=(running&&running.wi===wi&&running.di===di&&runDraft)?setProgress(runDraft):null;
        const last=lastSessionFor(d.id);
        let foot;
        if(active)foot=`<div class="bar"><span style="width:${active.tot?active.done/active.tot*100:0}%"></span></div><div class="mut" style="margin-top:3px">▶ en cours · ${active.done}/${active.tot}</div>`;
        else if(last)foot=`<div class="mut" style="margin-top:3px">✓ ${last.date} · ${last.nSets} série${last.nSets>1?'s':''}</div>`;
        else if(tot)foot=`<div class="mut" style="margin-top:3px">à faire · ${tot} série${tot>1?'s':''}</div>`;
        else foot=`<div class="mut" style="margin-top:3px">à planifier</div>`;
        h+=`<div class="wcard" data-drag="wk" data-wi="${wi}" data-di="${di}">
          <div class="wcard-grip" onpointerdown="dragStart(event,'wk',${wi},${di})">⋮⋮</div>
          <div class="wcard-body" onclick="openEditor(${wi},${di})">
            <div class="wcard-title">${esc(d.name)}</div>
            <div class="mut">${d.items.length} exo${preview?` · ${esc(preview)}`:''}</div>
            ${d.items.length?`<div class="mut">≈ ${fmtDur(estDuration(d))} · stress ${fmtStress(workoutStress(d))}</div>`:''}

        </div>`;
      });
      h+=`<button class="addcard" onclick="addWorkout(${wi})">＋ Séance</button></div>`;
    }
    h+=`</div>`;
  });
  h+=`<button class="addweek mt" onclick="addWeek()">＋ Semaine</button>`;
  return h;
}

/* ----- in-workout helpers: plates, last-time, rest timer, wake lock ----- */
function platesFor(target,bar){
  bar=bar||S.settings.bar||20;
  let per=(target-bar)/2;if(per<=0.0001)return [];
  const avail=[25,20,15,10,5,2.5,1.25];const out=[];
  for(const pp of avail){while(per>=pp-1e-9){out.push(pp);per=Math.round((per-pp)*100)/100;}}
  return out;
}
function lastTimeFor(exId){
  let latest=null;
  (S.sessions||[]).forEach(se=>se.entries.forEach(en=>{
    const k=en.exId||(en.muscle?"m:"+en.muscle:null);
    if(k!==exId||en.metric!=="weight")return;
    const sets=en.sets.filter(s=>s.load!=null&&s.reps!=null);
    if(!sets.length)return;
    if(!latest||se.ts>latest.ts)latest={ts:se.ts,date:se.date,sets};
  }));
  if(!latest)return null;
  const top=latest.sets.reduce((a,b)=>(+b.load>+a.load?b:a));
  return {date:latest.date,load:+top.load,reps:+top.reps,rpe:top.rpe,n:latest.sets.length};
}
/* Joker slots: the most recent session entry done for a muscle (whatever exercise filled it). */
function lastForMuscle(mu){
  let best=null;
  (S.sessions||[]).forEach(se=>se.entries.forEach(en=>{
    if(en.muscle!==mu||en.metric!=="weight")return;
    const sets=en.sets.filter(s=>s.load!=null&&s.reps!=null);if(!sets.length)return;
    if(!best||se.ts>best.ts){const top=sets.reduce((a,b)=>(+b.load>+a.load?b:a));best={ts:se.ts,date:se.date,name:en.name,load:+top.load,reps:+top.reps};}
  }));
  return best;
}
function stepField(ei,si,f,delta){
  const it=runWorkout().items[ei],set=it.sets[si],ex=exById(it.exId);
  let v=set[f];
  if(v==null)v=f==="aLoad"?(plannedLoad(set,ex)||0):f==="aReps"?(set.reps||0):0;
  v=Math.max(0,Math.round((+v+delta)*100)/100);
  set[f]=v;render();   // draft is ephemeral — no persist until finishRun
}
/* Deadline-based so the countdown stays correct across phone lock / app backgrounding. */
let restRem=0,restTmr=null,restEndAt=0;
function fmtTime(s){s=Math.max(0,s|0);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function restUI(){const e=$("#restTime");if(e)e.textContent=fmtTime(restRem);}
function restStart(sec){sec=sec||S.settings.rest||120;restEndAt=Date.now()+sec*1000;restRem=sec;$("#rest").classList.add("show");restUI();clearInterval(restTmr);restTmr=setInterval(restTick,250);}
function restTick(){const rem=Math.round((restEndAt-Date.now())/1000);if(rem!==restRem){restRem=rem;restUI();}if(rem<=0)restEnd();}
function restEnd(){clearInterval(restTmr);restTmr=null;restEndAt=0;restRem=0;restUI();buzz([180,90,180]);beep();notifyRest();setTimeout(()=>{if(restRem<=0)restSkip();},2200);}
function restAdd(d){if(!restEndAt)restEndAt=Date.now();restEndAt=Math.max(Date.now(),restEndAt+d*1000);restRem=Math.round((restEndAt-Date.now())/1000);if(restRem>0&&!restTmr)restTmr=setInterval(restTick,250);$("#rest").classList.add("show");restUI();}
function restSkip(){clearInterval(restTmr);restTmr=null;restEndAt=0;const r=$("#rest");if(r)r.classList.remove("show");}
/* recompute the timer when returning to the foreground (intervals are throttled while hidden) */
function restCatchUp(){if(!restEndAt)return;if(Date.now()>=restEndAt)restEnd();else restTick();}
function buzz(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
/* one shared AudioContext, unlocked on first user gesture (mobile suspends audio until then) */
let audioCtx=null;
function unlockAudio(){try{if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();}catch(e){}}
function beep(){try{unlockAudio();if(!audioCtx)return;const t0=audioCtx.currentTime;[0,0.18,0.36].forEach((dt,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type="sine";o.frequency.value=i===2?1175:880;g.gain.setValueAtTime(0.0001,t0+dt);g.gain.exponentialRampToValueAtTime(0.22,t0+dt+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t0+dt+0.15);o.start(t0+dt);o.stop(t0+dt+0.17);});}catch(e){}}
/* end-of-rest OS notification (best-effort; opt-in via Données). Reliable even when backgrounded on Android. */
function notifyRest(){
  try{
    if(!S.settings.notify||!("Notification" in window)||Notification.permission!=="granted"||!document.hidden)return;
    const opts={body:"Série suivante 💪",tag:"rest-done",icon:"icons/icon-192.png",badge:"icons/icon-192.png",renotify:true};
    if(navigator.serviceWorker&&navigator.serviceWorker.ready)
      navigator.serviceWorker.ready.then(reg=>reg.showNotification("Repos terminé",opts)).catch(()=>{try{new Notification("Repos terminé",opts);}catch(e){}});
    else try{new Notification("Repos terminé",opts);}catch(e){}
  }catch(e){}
}
async function enableNotify(on){
  if(!on){S.settings.notify=false;persist();render();return;}
  if(!("Notification" in window)){toast("Notifications non supportées");render();return;}
  let p=Notification.permission;
  if(p==="default"){try{p=await Notification.requestPermission();}catch(e){p="denied";}}
  if(p!=="granted"){toast("Permission refusée");S.settings.notify=false;persist();render();return;}
  S.settings.notify=true;persist();toast("Notifications activées");render();
}

      });

  });

/* ----- popover menus ----- */
let menuDismiss=null;
function closeMenu(){const e=$(".popmenu");if(e)e.remove();if(menuDismiss){document.removeEventListener("pointerdown",menuDismiss,true);menuDismiss=null;}}
function popMenu(ev,items){
  ev.stopPropagation();closeMenu();
  const m=document.createElement("div");m.className="popmenu";
  items.forEach(([label,fn,danger])=>{const b=document.createElement("button");b.textContent=label;if(danger)b.className="danger";
    b.onclick=()=>{closeMenu();fn();};m.appendChild(b);});
  document.body.appendChild(m);
  const r=ev.currentTarget.getBoundingClientRect();
  m.style.top=Math.min(r.bottom+4,window.innerHeight-m.offsetHeight-8)+"px";
  m.style.right=Math.max(8,window.innerWidth-r.right)+"px";
  // dismiss only when the pointer goes down OUTSIDE the menu (not on a menu item)
  menuDismiss=(e)=>{if(!m.contains(e.target))closeMenu();};
  setTimeout(()=>document.addEventListener("pointerdown",menuDismiss,true),0);
  armBack();
}

function finishRun(){

      if(met==="carry")return {load:numOrNull(s.aLoad!=null?s.aLoad:s.load),dist:numOrNull(s.aDist!=null?s.aDist:s.dist)};
      return {load:numOrNull(s.aLoad!=null?s.aLoad:s.load),reps:numOrNull(s.aReps!=null?s.aReps:(s.reps==="AMRAP"?null:s.reps)),rpe:numOrNull(s.aRpe!=null?s.aRpe:s.rpe)};

/* ===================== DRAG & DROP ===================== */
let dnd=null;
function dragStart(e,kind,a,b,wi,di){
  e.preventDefault();e.stopPropagation();
  const sel=kind==="wk"?".wcard":kind==="week"?".weekcol":".card";
  const el=e.target.closest(sel);if(!el)return;
  const r=el.getBoundingClientRect();
  const ghost=el.cloneNode(true);
  ghost.classList.add("dragghost");
  ghost.style.left=r.left+"px";ghost.style.top=r.top+"px";ghost.style.width=r.width+"px";
  document.body.appendChild(ghost);
  el.classList.add("drag-src");
  dnd={kind,a,b,el,ghost,dx:e.clientX-r.left,dy:e.clientY-r.top,idx:null,wi:null,exWi:wi,exDi:di};
  document.body.style.userSelect="none";
  window.addEventListener("pointermove",dragMove,{passive:false});
  window.addEventListener("pointerup",dragEnd,{once:true});
}
function dragMove(e){
  if(!dnd)return;e.preventDefault();
  dnd.ghost.style.left=(e.clientX-dnd.dx)+"px";
  dnd.ghost.style.top=(e.clientY-dnd.dy)+"px";
  const m=64,vh=window.innerHeight;
  if(e.clientY<m+46)window.scrollBy(0,-16);
  else if(e.clientY>vh-m)window.scrollBy(0,16);
  computeTarget(e.clientX,e.clientY);
}
function siblings(kind){
  const sel=kind==="wk"?'.wcard':kind==="week"?'.weekcol':'[data-drag="ex"]';
  let els=[...document.querySelectorAll(sel)].filter(n=>!n.classList.contains("drag-src"));
  if(kind==="ex")els=els.filter(n=>+n.dataset.wi===dnd.exWi&&+n.dataset.di===dnd.exDi);
  return els;
}
function computeTarget(x,y){
  const dl=$("#dropline");
  if(dnd.kind==="wk"){
    // find target week body
    const bodies=[...document.querySelectorAll("[data-weekbody]")];
    let body=null;
    for(const bd of bodies){const r=bd.getBoundingClientRect();if(y>=r.top-14&&y<=r.bottom+14){body=bd;break;}}
    if(!body){ // nearest by vertical distance
      let best=1e9;for(const bd of bodies){const r=bd.getBoundingClientRect();const dist=y<r.top?r.top-y:y-r.bottom;if(dist<best){best=dist;body=bd;}}
    }
    if(!body){dnd.wi=null;dl.style.display="none";return;}
    const wi=+body.dataset.wi;
    const cards=[...body.querySelectorAll(".wcard")].filter(n=>!n.classList.contains("drag-src"));
    let idx=cards.length;
    for(let i=0;i<cards.length;i++){const r=cards[i].getBoundingClientRect();if(y<r.top+r.height/2){idx=i;break;}}
    dnd.wi=wi;dnd.idx=idx;
    placeLine(body,cards,idx);
  }else{
    const sibs=siblings(dnd.kind);
    let idx=sibs.length;
    for(let i=0;i<sibs.length;i++){const r=sibs[i].getBoundingClientRect();if(y<r.top+r.height/2){idx=i;break;}}
    dnd.idx=idx;
    const cont=dnd.kind==="ex"?(dnd.el.parentElement||$("#app")):$("#app");
    placeLine(cont,sibs,idx);
  }
}
function placeLine(container,items,idx){
  const dl=$("#dropline");const cr=container.getBoundingClientRect();
  let top;
  if(!items.length){top=cr.top+10;}
  else if(idx>=items.length){const r=items[items.length-1].getBoundingClientRect();top=r.bottom+3;}
  else{const r=items[idx].getBoundingClientRect();top=r.top-3;}
  dl.style.left=(cr.left+8)+"px";dl.style.width=(cr.width-16)+"px";dl.style.top=top+"px";dl.style.display="block";
}
function dragEnd(e){
  window.removeEventListener("pointermove",dragMove);
  $("#dropline").style.display="none";
  document.body.style.userSelect="";
  if(!dnd){return;}
  const d=dnd;dnd=null;
  if(d.ghost)d.ghost.remove();
  if(d.el)d.el.classList.remove("drag-src");
  if(d.idx==null){render();return;}
  if(d.kind==="wk"&&d.wi!=null) moveWorkout(d.a,d.b,d.wi,d.idx);
  else if(d.kind==="week") moveWeek(d.a,d.idx);
  else if(d.kind==="ex") moveExercise(d.exWi,d.exDi,d.a,d.idx);
  render();
}
function moveWorkout(fromWi,fromDi,toWi,toIdx){const weeks=curP().weeks;const [m]=weeks[fromWi].days.splice(fromDi,1);weeks[toWi].days.splice(toIdx,0,m);persist();}
function moveWeek(from,to){const weeks=curP().weeks;const [m]=weeks.splice(from,1);weeks.splice(to,0,m);persist();}
function moveExercise(wi,di,from,to){const items=wk(wi,di).items;const [m]=items.splice(from,1);items.splice(to,0,m);persist();}

/* All logged weight sets, flattened from stored sessions. Single source for every stat below. */
function loggedSets(){
  const out=[];
  (S.sessions||[]).forEach(se=>se.entries.forEach(en=>{
    if(en.metric!=="weight")return;
    const exId=en.exId||(en.muscle?"m:"+en.muscle:null);
    en.sets.forEach(s=>{
      if(s.load==null||s.reps==null)return;
      out.push({exId,load:+s.load,reps:+s.reps,e1:e1rm(+s.load,+s.reps,s.rpe!=null?+s.rpe:null),pn:se.programName||"",wn:se.weekName||"",date:se.date,ts:se.ts,sessId:se.id});
    });
  }));
  return out;
}
function latestBW(){
  if(!S.bodyweight||!S.bodyweight.length)return null;
  const s=[...S.bodyweight].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  return s[s.length-1].kg;
}
function bestE1ByLift(lift){
  const ids=S.exercises.filter(e=>e.lift===lift).map(e=>e.id);
  let best=0;
  loggedSets().forEach(s=>{if(ids.includes(s.exId)&&s.e1>best)best=s.e1;});
  return best;
}
function dotsCoef(bw,sex){
  const c=sex==="F"
    ?[-57.96288,13.6175032,-0.1126655495,0.0005158568,-0.0000010706]
    :[-307.75076,24.0900756,-0.1918759221,0.0007391293,-0.000001093];
  const d=c[0]+c[1]*bw+c[2]*bw*bw+c[3]*Math.pow(bw,3)+c[4]*Math.pow(bw,4);
  return 500/d;
}
function dotsScore(){
  const bw=latestBW();if(!bw)return null;
  let total=0,have=0;
  ["squat","bench","deadlift"].forEach(L=>{const b=bestE1ByLift(L);if(b){total+=b;have++;}});
  if(!have)return null;
  return {score:Math.round(dotsCoef(bw,S.settings.sex||"M")*total*10)/10,total:Math.round(total*10)/10,have,bw};
}
function wilksScore(){
  const bw=latestBW();if(!bw)return null;
  let total=0,have=0;["squat","bench","deadlift"].forEach(L=>{const b=bestE1ByLift(L);if(b){total+=b;have++;}});
  if(!have)return null;
  const c=S.settings.sex==="F"
    ?[594.31747775582,-27.23842536447,0.82112226871,-0.00930733913,0.00004731582,-0.00000009054]
    :[-216.0475144,16.2606339,-0.002388645,-0.00113732,0.000007018,-0.0000000129];
  let den=0;for(let i=0;i<6;i++)den+=c[i]*Math.pow(bw,i);
  return Math.round(500/den*total*10)/10;
}
function trainingDays(){const m={};loggedSets().forEach(s=>{if(s.date)m[s.date]=(m[s.date]||0)+1;});return m;}
function calHtml(){
  const m=trainingDays();const end=new Date();end.setHours(12,0,0,0);
  const start=new Date(end);start.setDate(end.getDate()-83);
  const cells=[];const pad=(start.getDay()+6)%7;
  for(let i=0;i<pad;i++)cells.push(null);
  for(let i=0;i<84;i++){const d=new Date(start);d.setDate(start.getDate()+i);const key=d.toISOString().slice(0,10);cells.push({key,c:m[key]||0,future:d>end});}
  const lvl=c=>c>=6?'l3':c>=3?'l2':c>=1?'l1':'';
  return `<div class="callbl">${["L","M","M","J","V","S","D"].map(x=>`<span>${x}</span>`).join("")}</div>`+
    `<div class="cal">`+cells.map(c=>c==null?`<div class="d empty"></div>`:`<div class="d ${c.future?'empty':lvl(c.c)}" title="${c.key}${c.c?' · '+c.c+' séries':''}"></div>`).join("")+`</div>`;
}

function lineSvg(series){
  const W=500,H=140,pad=24;
  if(series.length&&typeof series[0]==="number")series=series.map((v,i)=>({t:i,v}));
  const vs=series.map(s=>s.v),ts=series.map(s=>s.t);
  const mnV=Math.min(...vs),mxV=Math.max(...vs),rV=(mxV-mnV)||1;
  const mnT=Math.min(...ts),mxT=Math.max(...ts),rT=(mxT-mnT)||1;
  const pts=series.map(s=>{
    const x=pad+(series.length===1?(W-2*pad)/2:(s.t-mnT)/rT*(W-2*pad));
    const y=H-pad-(s.v-mnV)/rV*(H-2*pad);return[x,y];});
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="var(--acc)"/>`).join('');
  const fd=t=>{const d=new Date(t);return isNaN(d)?'':d.getDate()+"/"+(d.getMonth()+1);};
  const ax=(ts[0]>1e6)?`<text x="${pad}" y="${H-3}" fill="#9aa3b2" font-size="10">${fd(mnT)}</text><text x="${W-pad}" y="${H-3}" text-anchor="end" fill="#9aa3b2" font-size="10">${fd(mxT)}</text>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:140px">
    <text x="2" y="14" fill="#9aa3b2" font-size="11">${mxV}</text>
    <text x="2" y="${H-pad+12}" fill="#9aa3b2" font-size="11">${mnV}</text>
    <path d="${path}" fill="none" stroke="var(--acc)" stroke-width="2.5"/>${dots}${ax}</svg>`;
}

/* ---------- inputs (delegation) ---------- */
document.addEventListener("input",e=>{
  const t=e.target;if(t.tagName!=="INPUT")return;
  const k=t.dataset.k;if(!k)return;
  const v=t.value.trim();
  const num=()=>v===""?null:+v.replace(",",".");
  if(k==="plan"){
    const set=wk(+t.dataset.wi,+t.dataset.di).items[+t.dataset.ei].sets[+t.dataset.si];const f=t.dataset.f;
    if(f==="load")set.load=num();
    else set[f]=num();
    persist();refreshPlanMeta(+t.dataset.wi,+t.dataset.di,+t.dataset.ei);   // live stress (set + workout) / duration
  }else if(k==="log"){
    // run actuals live on the ephemeral draft — saved into a session only on "Terminer"
    const dr=runWorkout();if(!dr)return;
    const set=dr.items[+t.dataset.ei].sets[+t.dataset.si];
    set[t.dataset.f]=num();
  }else if(k==="rest"){
    const it=wk(+t.dataset.wi,+t.dataset.di).items[+t.dataset.ei];it.rest=v===""?null:Math.max(0,Math.round(+v.replace(",",".")));persist();refreshPlanMeta(+t.dataset.wi,+t.dataset.di);
  }else if(k==="orm"){
    const ex=exById(t.dataset.id);ex.orm=v===""?0:+v.replace(",",".");persist();
  }else if(k==="exname"){
    const ex=exById(t.dataset.id);if(ex)ex.name=v;persist();
  }
});

function setEx(id,f,v){const ex=exById(id);if(!ex)return;ex[f]=((f==="lift"||f==="muscle")&&v==="")?null:v;persist();}
function inferMuscle(ex){
  if(ex.muscle)return ex.muscle;
  if(ex.metric==="cardio")return null;
  const n=(ex.name||"").toLowerCase();
  for(const [re,mu] of MUSCLE_HINTS){if(re.test(n))return mu;}
  return null;
}
async function completeLibrary(){
  if(!await modalConfirm("Ajouter les exercices courants manquants et taguer (muscle) les exercices existants ?",{ok:"Compléter"}))return;
  let added=0,tagged=0;
  S.exercises.forEach(ex=>{if(!ex.muscle){const m=inferMuscle(ex);if(m){ex.muscle=m;tagged++;}}});
  const have=new Set(S.exercises.map(e=>(e.name||"").trim().toLowerCase()));
  LIB.forEach(([name,category,muscle,metric,lift])=>{
    if(have.has(name.toLowerCase()))return;
    S.exercises.push({id:uid(),name,category,muscle:muscle||null,metric:metric||"weight",lift:lift||null,orm:0});added++;
  });
  persist();render();toast(added+" ajoutés · "+tagged+" tagués");
}

  Cloud.cfg={binId:"",key:"",lastSyncedAt:null};Cloud.dirty=false;Cloud.saveCfg();Cloud.setStatus("idle");render();}}

/* ===================== MODALS & UNDO ===================== */
let modalCancel=null;   // how the topmost modal resolves when dismissed by phone Back
function modalClose(){const r=$("#modalRoot");if(r)r.innerHTML="";modalCancel=null;}
function modalConfirm(msg,opts={}){
  return new Promise(res=>{
    $("#modalRoot").innerHTML=`<div class="scrim"><div class="modal"><h3>${esc(opts.title||"Confirmer")}</h3>`+
      `<div class="mut">${esc(msg)}</div><div class="mrow"><button id="m_c">${esc(opts.cancel||"Annuler")}</button>`+
      `<button id="m_o" class="${opts.danger?'danger':'acc'}">${esc(opts.ok||"OK")}</button></div></div></div>`;
    const done=v=>{modalClose();res(v);};
    modalCancel=()=>done(false);armBack();
    $("#m_c").onclick=()=>done(false);
    $("#m_o").onclick=()=>done(true);
    $(".scrim").addEventListener("click",e=>{if(e.target.classList.contains("scrim"))done(false);});
  });
}
function modalPrompt(msg,def="",opts={}){
  return new Promise(res=>{
    $("#modalRoot").innerHTML=`<div class="scrim"><div class="modal"><h3>${esc(opts.title||msg)}</h3>`+
      `<input id="m_i" value="${esc(def==null?"":def)}" ${opts.numeric?'inputmode="decimal"':""} placeholder="${esc(opts.ph||"")}">`+
      `<div class="mrow"><button id="m_c">Annuler</button><button id="m_o" class="acc">${esc(opts.ok||"OK")}</button></div></div></div>`;
    const inp=$("#m_i");setTimeout(()=>{inp.focus();try{inp.select();}catch(e){}},30);
    const done=v=>{modalClose();res(v);};
    modalCancel=()=>done(null);armBack();
    $("#m_c").onclick=()=>done(null);
    $("#m_o").onclick=()=>done(inp.value.trim());
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")done(inp.value.trim());});
    $(".scrim").addEventListener("click",e=>{if(e.target.classList.contains("scrim"))done(null);});
  });
}
function modalChoose(title,items,opts={}){
  return new Promise(res=>{
    const root=$("#modalRoot");
    const draw=q=>{
      const ql=(q||"").toLowerCase();
      const list=items.filter(it=>!ql||it.label.toLowerCase().includes(ql));
      root.querySelector(".mlist").innerHTML=list.map(it=>`<button data-v="${esc(it.value)}">${esc(it.label)}${it.sub?` <span class="mut">${esc(it.sub)}</span>`:""}</button>`).join("")||`<div class="mut" style="padding:8px">Aucun résultat</div>`;
      root.querySelectorAll(".mlist button").forEach(b=>b.onclick=()=>{modalClose();res(b.dataset.v);});
    };
    root.innerHTML=`<div class="scrim"><div class="modal"><h3>${esc(title)}</h3>`+
      (opts.search?`<input id="m_s" class="msearch" placeholder="Rechercher…">`:"")+
      (opts.newLabel?`<button class="full acc mb" id="m_new">${esc(opts.newLabel)}</button>`:"")+
      `<div class="mlist"></div><div class="mrow"><button id="m_c">Annuler</button></div></div></div>`;
    draw("");
    if(opts.search){const s=$("#m_s");s.addEventListener("input",()=>draw(s.value));setTimeout(()=>s.focus(),30);}
    if(opts.newLabel)$("#m_new").onclick=()=>{modalClose();res("__new__");};
    modalCancel=()=>{modalClose();res(null);};armBack();
    $("#m_c").onclick=()=>{modalClose();res(null);};
    $(".scrim").addEventListener("click",e=>{if(e.target.classList.contains("scrim")){modalClose();res(null);}});
  });
}
let undoSnap=null,undoTimer=null;
function snapshot(label){undoSnap=JSON.stringify(S);const s=$("#snack");$("#snackmsg").textContent=label;s.classList.add("show");clearTimeout(undoTimer);undoTimer=setTimeout(()=>s.classList.remove("show"),6000);}
function doUndo(){if(!undoSnap)return;S=JSON.parse(undoSnap);undoSnap=null;$("#snack").classList.remove("show");edit=null;running=null;runDraft=null;statSess=null;if(curPi>=S.programs.length)curPi=0;persist();render();toast("Annulé");}

/* ---------- phone Back: pop the topmost layer instead of leaving the app ---------- */
/* Invariant: backArmed ⇔ exactly one "trap" entry on the history stack. We push one
   whenever a closeable layer is open, and consume it on popstate (hardware/browser Back). */
let backArmed=false;
function backNeeded(){return !!(running||edit||editAll||statEx||statSess||document.querySelector(".scrim")||document.querySelector(".popmenu"));}
function armBack(){try{if(backNeeded()&&!backArmed){history.pushState({trap:1},"");backArmed=true;}}catch(e){}}
function goBack(){
  if(document.querySelector(".scrim")){const f=modalCancel;modalCancel=null;if(f)f();else modalClose();return true;}
  if(document.querySelector(".popmenu")){closeMenu();return true;}
  if(statSess){statSess=null;render();return true;}
  if(statEx){statEx=null;render();return true;}
  if(running||edit||editAll){backToBoard();return true;}
  return false;
}
window.addEventListener("popstate",()=>{backArmed=false;if(goBack())armBack();});

/* ---------- boot ---------- */
Cloud.loadCfg();
$("#sync").onclick=()=>{if(Cloud.enabled())Cloud.syncNow(true);else go("data");};
$("#snackbtn").onclick=doUndo;
render();
if(Cloud.enabled())Cloud.pull();
window.addEventListener("pointerdown",unlockAudio,{once:true});   // unlock WebAudio on first tap
window.addEventListener("online",()=>{renderSync();if(Cloud.enabled()&&!Cloud.dirty)Cloud.pull();});
window.addEventListener("offline",()=>Cloud.setStatus("off"));
document.addEventListener("visibilitychange",()=>{if(!document.hidden){if(running)wakeOn();restCatchUp();if(Cloud.enabled()&&!Cloud.dirty)Cloud.pull();}});
if("serviceWorker" in navigator && location.protocol!=="file:" && !window.Cypress) window.addEventListener("load",()=>{
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.addEventListener("updatefound",()=>{const nw=reg.installing;if(nw)nw.addEventListener("statechange",()=>{if(nw.state==="installed"&&navigator.serviceWorker.controller)showUpdate(reg);});});
  }).catch(()=>{});
  let reloaded=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{if(reloaded)return;reloaded=true;location.reload();});
});
function showUpdate(reg){
  const s=$("#updbar");if(!s)return;
  s.classList.add("show");
  $("#updbtn").onclick=()=>{if(reg.waiting)reg.waiting.postMessage({type:"skipWaiting"});};
}
</script>
